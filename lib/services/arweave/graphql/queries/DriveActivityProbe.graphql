query DriveActivityProbe(
  $driveIds: [String!]!
  $minBlockHeight: Int
  $ownerAddress: String!
) {
  transactions(
    owners: [$ownerAddress]
    first: 100
    sort: HEIGHT_ASC
    tags: [
      { name: "Drive-Id", values: $driveIds }
    ]
    block: { min: $minBlockHeight }
  ) {
    pageInfo {
      hasNextPage
    }
    edges {
      node {
        tags {
          name
          value
        }
      }
    }
  }
}
