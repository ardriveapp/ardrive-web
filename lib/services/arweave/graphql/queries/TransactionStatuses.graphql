query TransactionStatuses($transactionIds: [ID!], $owners: [String!]) {
  transactions(first: 100, ids: $transactionIds, owners: $owners) {
    edges {
      node {
        id
        block {
          height
        }
      }
    }
  }
  blocks(first: 1) {
    edges {
      node {
        id
        height
      }
    }
  }
}
