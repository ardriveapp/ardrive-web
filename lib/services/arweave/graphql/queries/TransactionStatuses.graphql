query TransactionStatuses($transactionIds: [ID!], $maxBlockHeight: Int) {
  transactions(first: 100, ids: $transactionIds, block: { max: $maxBlockHeight }) {
    edges {
      node {
        id
        block {
          height
        }
      }
    }
  }
  blocks(first: 1) {
    edges {
      node {
        id
        height
      }
    }
  }
}
